services:
  dfs-tracker:
    image: delron/fastdfs:latest
    container_name: dfs-tracker
    ports:
      - "22122:22122"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./dfs/tracker/data:/data/fastdfs_data
    command: tracker
    networks:
      - dfs-net
    restart: unless-stopped

  dfs-storage:
    image: delron/fastdfs:latest
    container_name: dfs-storage
    ports:
      - "23000:23000"
      - "8888:8888"
    privileged: true
    environment:
      - TRACKER_SERVER=dfs-tracker:22122
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./dfs/storage/metadata:/data/fastdfs_data
      - ./dfs/upload:/data/fastdfs/upload
    command: storage
    depends_on:
      - dfs-tracker
    networks:
      - dfs-net
    restart: unless-stopped

networks:
  dfs-net:
    driver: bridge
